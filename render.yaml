services:
  - type: web
    name: mindbloom-backend
    plan: starter
    runtime: docker
    dockerfilePath: backend/Dockerfile
    healthCheckPath: /
    startCommand: "python manage.py bootstrap_db && gunicorn mindbloom.wsgi:application --bind 0.0.0.0:${PORT}"
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: JWT_SECRET_KEY
        value: "RENDER_USE_A_LONG_RANDOM_SECRET"
      - key: DJANGO_ALLOWED_HOSTS
        value: ${RENDER_EXTERNAL_URL}
      - key: DATABASE_URL
        value: "RENDER_MYSQL_CONNECTION_STRING"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://${RENDER_EXTERNAL_URL}"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://${RENDER_EXTERNAL_URL}"


  - type: web
    name: mindbloom-frontend
    plan: starter
    runtime: node
    buildCommand: "cd frontend && npm ci && npm run build"
    startCommand: "cd frontend && npx serve -s dist -l ${PORT}"
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_BASE_URL
        value: "https://mindbloom-backend.onrender.com"


